<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8903a"/>
      <stop offset="100%" stop-color="#d97736"/>
    </linearGradient>
  </defs>

  <!-- Background: top corners rounded, bottom corners sharp -->
  <path d="M8,0 L24,0 Q32,0 32,8 L32,32 L0,32 L0,8 Q0,0 8,0 Z" fill="url(#bg)"/>

  <!-- Bottom accent bar (sharp corners, flush to bottom) -->
  <rect x="0" y="28" width="32" height="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="0" y="25" width="32" height="7" fill="url(#accent)" opacity="0.12"/>

  <!-- Play triangle — centered -->
  <polygon points="12,9 12,23 24,16" fill="url(#accent)"/>
</svg>
