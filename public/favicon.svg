<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8903a"/>
      <stop offset="100%" stop-color="#d97736"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Bottom accent glow bar -->
  <rect x="0" y="28" width="32" height="4" rx="0" fill="url(#accent)" opacity="0.85"/>
  <rect x="0" y="26" width="32" height="6" rx="0" fill="url(#accent)" opacity="0.15"/>

  <!-- Play triangle icon — centered -->
  <polygon
    points="12,9 12,23 24,16"
    fill="url(#accent)"
  />
</svg>